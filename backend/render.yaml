services:
  - type: web
    name: cell-learning
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cell-learning-db
          property: connectionString

databases:
  - name: cell-learning-db
    plan: free
