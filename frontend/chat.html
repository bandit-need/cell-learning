<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ติดต่อครู — Cell Learning</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Kanit',sans-serif;background:#050210;color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:rgba(5,2,16,.95);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;padding:12px 16px;display:flex;align-items:center;gap:12px}
.teacher-av{width:40px;height:40px;background:linear-gradient(135deg,#6d28d9,#d946ef);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.online-dot{width:10px;height:10px;background:#10b981;border-radius:50%;border:2px solid #050210;position:absolute;bottom:0;right:0}
.messages{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:10px}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:9px}
.bubble-wrap{display:flex;align-items:flex-end;gap:8px}
.bubble-wrap.mine{flex-direction:row-reverse}
.av-sm{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5;word-break:break-word}
.bubble.mine{background:linear-gradient(135deg,#6d28d9,#7c3aed);border-bottom-right-radius:4px}
.bubble.theirs{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-bottom-left-radius:4px}
.ts{font-size:9px;color:rgba(255,255,255,.3);margin-top:3px}
.bubble-wrap.mine .ts{text-align:right}
.input-area{flex-shrink:0;background:rgba(5,2,16,.95);border-top:1px solid rgba(255,255,255,.06);padding:10px 12px;display:flex;gap:8px;align-items:flex-end}
textarea{flex:1;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:16px;color:#fff;font-family:'Kanit',sans-serif;font-size:14px;padding:10px 14px;resize:none;outline:none;min-height:42px;max-height:120px;line-height:1.5;transition:border .2s}
textarea:focus{border-color:rgba(124,58,237,.6);background:rgba(124,58,237,.08)}
textarea::placeholder{color:rgba(255,255,255,.25)}
.send-btn{width:42px;height:42px;background:linear-gradient(135deg,#6d28d9,#a855f7);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.send-btn:hover{transform:scale(1.08);box-shadow:0 4px 20px rgba(124,58,237,.5)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;opacity:.4}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .3s ease both}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <a href="%E0%B9%89home.html" class="w-9 h-9 bg-white/5 border border-white/8 rounded-xl flex items-center justify-center hover:bg-white/10 transition-all flex-shrink-0">
    <i class="fas fa-arrow-left text-xs text-gray-400"></i>
  </a>
  <div class="relative flex-shrink-0">
    <div class="teacher-av">👩‍🏫</div>
    <div class="online-dot"></div>
  </div>
  <div class="flex-1 min-w-0">
    <p class="text-sm font-bold leading-none">ครูตั๊ก</p>
    <p class="text-[10px] text-emerald-400 mt-0.5">● ออนไลน์</p>
  </div>
  <div class="text-[9px] text-gray-600 text-right leading-relaxed">
    <p>ชีววิทยา</p>
    <p>Cell Learning</p>
  </div>
</div>

<!-- Messages -->
<div class="messages" id="msgList">
  <div class="empty-state" id="emptyState">
    <div class="text-5xl">💬</div>
    <div class="text-center">
      <p class="text-sm font-semibold text-gray-400">เริ่มการสนทนา</p>
      <p class="text-xs text-gray-600 mt-1">ส่งข้อความเพื่อถามครูตั๊กได้เลย</p>
    </div>
  </div>
</div>

<!-- Input Area -->
<div class="input-area">
  <textarea id="msgInput" placeholder="พิมพ์ข้อความถึงครูตั๊ก..." rows="1"
    oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
    <i class="fas fa-paper-plane text-sm"></i>
  </button>
</div>

<script>
const API = '';
const token = localStorage.getItem('cl_token');
const user  = JSON.parse(localStorage.getItem('cl_user') || '{}');

if (!token) window.location.href = 'login.html';

let lastId = 0;
let polling = null;

function fmt(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}

function renderMsg(m, animate) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap' + (m.is_mine ? ' mine' : '') + (animate ? ' fu' : '');

  const av = document.createElement('div');
  av.className = 'av-sm';
  av.style.cssText = m.is_mine
    ? 'background:linear-gradient(135deg,#6d28d9,#a855f7)'
    : 'background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1)';
  av.textContent = m.is_mine ? (user.first_name || 'ฉัน')[0] : '👩‍🏫';

  const right = document.createElement('div');
  right.style.cssText = m.is_mine ? 'text-align:right' : '';

  const bub = document.createElement('div');
  bub.className = 'bubble ' + (m.is_mine ? 'mine' : 'theirs');
  bub.textContent = m.content;

  const ts = document.createElement('div');
  ts.className = 'ts';
  ts.textContent = fmt(m.created_at) + (m.is_mine ? '' : ' · ' + m.sender_name);

  right.appendChild(bub);
  right.appendChild(ts);
  if (m.is_mine) { wrap.appendChild(right); wrap.appendChild(av); }
  else { wrap.appendChild(av); wrap.appendChild(right); }

  return wrap;
}

async function loadMessages(silent) {
  try {
    const res = await fetch(`${API}/api/chat/messages`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401) { window.location.href = 'login.html'; return; }
    const msgs = await res.json();

    const list = document.getElementById('msgList');
    const empty = document.getElementById('emptyState');

    if (msgs.length === 0) {
      if (!silent) { empty.style.display = 'flex'; }
      return;
    }
    empty.style.display = 'none';

    // Only add new messages
    const newMsgs = msgs.filter(m => m.id > lastId);
    if (newMsgs.length === 0) return;

    newMsgs.forEach(m => {
      lastId = Math.max(lastId, m.id);
      list.appendChild(renderMsg(m, !silent));
    });

    list.scrollTop = list.scrollHeight;
  } catch {}
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;

  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = '';

  try {
    const res = await fetch(`${API}/api/chat/messages`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    if (res.ok) {
      const m = await res.json();
      m.is_mine = true;
      m.sender_name = user.first_name || '';
      lastId = Math.max(lastId, m.id);

      const list = document.getElementById('msgList');
      document.getElementById('emptyState').style.display = 'none';
      list.appendChild(renderMsg(m, true));
      list.scrollTop = list.scrollHeight;
    }
  } catch {}
  document.getElementById('sendBtn').disabled = false;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('sendBtn').disabled = !el.value.trim();
}

document.getElementById('msgInput').addEventListener('input', function() {
  document.getElementById('sendBtn').disabled = !this.value.trim();
});

loadMessages(false);
polling = setInterval(() => loadMessages(true), 5000);
</script>
</body>
</html>
